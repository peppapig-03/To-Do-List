<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-items</title>
</head>
<body>
    <div class="bigTitle">Todo-items</div>
    <div class="cardGroup"></div>
    <div class="buttonBox">
        <button id="newProject" command="show-modal" commandfor="dialogForm">
            <svg width="100" height="100">
                <title>New Project</title>
                <circle cx="50" ,="" cy="50" r="48" stroke="black" stroke-width="0" fill="#A2D2FF"></circle>
                <text x="25" ,="" y="80" fill="black" font-size="90">+</text>
            </svg>
        </button>
        <dialog id="dialogForm">
            <button commandfor="dialogForm" command="close" id="closeButton">
                <svg width="50" height="50">
                    <title>Close</title>
                    <circle cx="25" ,="" cy="25" r="25" stroke="black" stroke-width="0" fill="#A2D2FF"></circle>
                    <text x="12" ,="" y="38" fill="black" font-size="50">x</text>
                </svg>
            </button>
            <form>
                <div class="queryBox">
                    <label for="titleInput">Title:</label>
                    <input type="text" id="titleInput" name="titleInput">
                </div><div class="queryBox">
                    <label for="descriptionInput">Description:</label>
                    <input type="text" id="descriptionInput" name="descriptionInput">
                </div><div class="queryBox">
                    <label for="dueDateInput">Due Date:</label>
                    <input type="text" id="dueDateInput" name="dueDateInput">
                </div><div class="queryBox">
                    <label for="priorityInput">Priority:</label>
                    <input type="text" id="priorityInput" name="priorityInput">   
                </div><div class="queryBox">
                    <label for="projectInput">Project:</label>
                    <select id="projectInput" name="projectInput">
                        <option>New</option>
                        <option>Test</option>
                    </select>
                </div>
                <div class="submitButtonBox">
                    <button id="submitButton">Submit</button> 
                </div>  
            </form>
        </dialog>
    </div>
</body>
</html>
